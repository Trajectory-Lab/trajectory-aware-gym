name: hotpotqa-tool
description: 'GEPA prompt optimization on HotpotQA with web search tool access. Compares
  against GEM''s published REINFORCE+ReBN single-environment baseline.

  '
environment:
  gem_env_id: qa:HotpotQA
  env_type: qa
  dspy_module: react
  train_size: 150
  val_size: 300
  test_split: test
  max_steps: 10
  discount_gamma: 0.9
  tools:
  - web_search
  dataset:
    hf_dataset_id: axon-rl/HotpotQA
    total_train_size: 90400
    subsample_size: 150
    subsample_strategy: uniform
    eval_dataset_id: axon-rl/search-eval
    eval_split: hotpotqa
    eval_size: 512
seed_prompt: "You are a multi-hop question answerer with access to a web search tool.\n\
  \nHow to respond on each turn, pick exactly ONE of:\n\n1. Call the `search` tool\
  \ to look up evidence. The `query` argument must\n   be a focused keyword phrase\
  \ targeting the specific fact you need next.\n   Example tool call:\n     {\"tool\"\
  : \"search\", \"arguments\": {\"query\": \"founding year Medici Bank Giovanni di\
  \ Bicci\"}}\n\n2. Commit your final answer by responding with ONLY \\boxed{...},\
  \ nothing\n   else. Example: \\boxed{Florence}\n\nNever mix these two modes in a\
  \ single response.\n\nFor multi-hop questions, break the question into sub-questions\
  \ and issue\none focused search per sub-question. Only commit an answer once the\n\
  retrieved evidence directly supports it.\n"
eval_protocol:
  max_response_tokens: 4096
  temperature_train: 1.0
  temperature_eval: 0.0
  top_p: 1.0
  top_k: -1
  rollouts_per_task: 1
  max_eval_workers: 32
  eval_episode_timeout_seconds: 120
  tost_margin: 0.05
  tost_alpha: 0.05
  bootstrap_iterations: 1000
task_models:
- name: Qwen3-1.7B-Base
  model_id: ollama/qwen3-1.7b-base
  provider: ollama
  parameter_count: 1.7B
- name: Qwen3-4B-Base
  model_id: ollama/qwen3-4b-base
  provider: ollama
  parameter_count: 4B
- name: Llama-3.1-8B-Instruct
  model_id: bedrock/us.meta.llama3-1-8b-instruct-v1:0
  provider: bedrock
  parameter_count: 8B
- name: Gemma-3-4B-IT
  model_id: bedrock/google.gemma-3-4b-it
  provider: bedrock
  parameter_count: 4B
- name: Mistral-7B-Instruct
  model_id: bedrock/mistral.mistral-7b-instruct-v0:2
  provider: bedrock
  parameter_count: 7B
- name: Nemotron-Nano-9B
  model_id: bedrock/nvidia.nemotron-nano-9b-v2
  provider: bedrock
  parameter_count: 9B
reflection_model:
  model_id: us.anthropic.claude-sonnet-4-5-20250929-v1:0
  provider: bedrock
  temperature: 1.0
  max_tokens: 4096
gepa_budget:
  mode: medium
  tasks_per_minibatch: 3
seeds:
  data_seed: 42
  replication_seeds:
  - 42
  - 123
  - 456
num_replications: 3
rl_baselines:
- algorithm: REINFORCE+ReBN
  environment: qa:HotpotQA
  model_name: Qwen3-4B
  model_size: 4B
  success_rate: 0.432
  tool_augmented: true
  training_condition: single
  metric_name: pass@1
  source: GEM (Liu et al., 2025)
  source_detail: Table 2, HotpotQA, +RL+tool single
  estimated: false
  training_details:
    learning_rate: 1.0e-06
    optimizer: AdamW
    adam_betas:
    - 0.9
    - 0.95
    gradient_clip: 1.0
    policy_clip: 0.2
    kl_coefficient: 0.0
    inner_epochs: 2
    gae_lambda: 0.95
    training_steps: 500
    infrastructure: 8x A100 GPUs, ~1 day
comparison_protocol:
  primary_metric: success_rate
  equivalence_test: TOST
  primary_rl_baseline: REINFORCE+ReBN (+tool, single)
  prompt_baselines:
  - name: zero-shot
    description: Unoptimized DSPy agent with hand-written instructions
    requires_optimization: false
  - name: miprov2
    description: DSPy's Bayesian prompt optimizer baseline
    optimizer: MIPROv2
    requires_optimization: true
cost_budget:
  estimated_tokens_per_experiment: 94000000
  total_budget_usd: 2500.0
  buffer_pct: 0.25
fitness_override:
  gamma: 0.9
  max_steps: 10
runtime_overrides:
  budget_mode: medium
