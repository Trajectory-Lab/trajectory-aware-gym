config_name = "grpo_hotpotqa_baseline"
algorithm = "grpo"
environment = "hotpotqa"
environment_id = "hotpotqa"
output_subdir = "baseline/grpo/hotpotqa"

[model]
provider = "bedrock"
model_ref = "env:BEDROCK_QWEN3_4B"

[runtime]
max_steps = 30
max_response_tokens = 4096
temperature_train = 1.0
temperature_eval = 0.0
top_p = 1.0

[budget]
train_episodes = 4000
eval_rollouts_per_task = 5
num_replications = 3
