config_name = "ppo_codecontest_baseline"
algorithm = "ppo"
environment = "codecontest"
environment_id = "codecontest"
output_subdir = "baseline/ppo/codecontest"

[model]
provider = "bedrock"
model_ref = "env:BEDROCK_QWEN3_4B"

[runtime]
max_steps = 50
max_response_tokens = 4096
temperature_train = 1.0
temperature_eval = 0.0
top_p = 1.0

[budget]
train_episodes = 3000
eval_rollouts_per_task = 5
num_replications = 3
