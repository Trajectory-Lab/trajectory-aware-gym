config_name = "ppo_math12k_baseline"
algorithm = "ppo"
environment = "math12k"
environment_id = "math12k"
output_subdir = "baseline/ppo/math12k"

[model]
provider = "bedrock"
model_ref = "env:BEDROCK_QWEN3_4B"

[runtime]
max_steps = 8
max_response_tokens = 4096
temperature_train = 1.0
temperature_eval = 0.0
top_p = 1.0

[budget]
train_episodes = 5000
eval_rollouts_per_task = 5
num_replications = 3
