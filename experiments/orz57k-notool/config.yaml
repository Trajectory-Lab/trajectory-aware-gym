# Orz57K: mathematical reasoning WITHOUT Python tool
# GEM paper: gamma=1.0 for math tasks, r=1 correct / r=0 wrong

name: orz57k-notool
description: >
  GEPA prompt optimization on Orz57K without tool access.
  Compares against GEM's published REINFORCE+ReBN no-tool baseline on MATH500.

seed_prompt: |
  You are a math problem solver.

  Work through the problem step by step. When you have the answer, respond
  with ONLY \boxed{...} as the final line of your response. Example:
  \boxed{42}

  The \boxed{} expression must be the last content in your response.

environment:
  gem_env_id: "math:Orz57K"
  env_type: math
  dspy_module: react
  train_size: 150
  val_size: 300
  max_steps: 10
  discount_gamma: 1.0
  tools: []
  dataset:
    hf_dataset_id: "axon-rl/ORZ-57k"
    total_train_size: 57000
    subsample_size: 150
    subsample_strategy: uniform
    eval_dataset_id: "axon-rl/math-eval"
    eval_split: MATH500
    eval_size: 500

eval_protocol:
  max_response_tokens: 4096
  temperature_train: 1.0
  temperature_eval: 0.0
  top_p: 1.0
  top_k: -1
  rollouts_per_task: 1
  tost_margin: 0.05
  tost_alpha: 0.05
  bootstrap_iterations: 1000

task_models:
  - name: Qwen3-4B-Base
    model_id: "sagemaker/qwen3-4b-base"
    provider: sagemaker
    parameter_count: "4B"

  - name: Llama-3.1-8B-Instruct
    model_id: "bedrock/us.meta.llama3-1-8b-instruct-v1:0"
    provider: bedrock
    parameter_count: "8B"

  - name: Gemma-3-4B-IT
    model_id: "bedrock/google.gemma-3-4b-it"
    provider: bedrock
    parameter_count: "4B"

  - name: Mistral-7B-Instruct
    model_id: "bedrock/mistral.mistral-7b-instruct-v0:2"
    provider: bedrock
    parameter_count: "7B"

  - name: Nemotron-Nano-9B
    model_id: "bedrock/nvidia.nemotron-nano-9b-v2"
    provider: bedrock
    parameter_count: "9B"

reflection_model:
  model_id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  provider: bedrock
  temperature: 1.0
  max_tokens: 4096

gepa_budget:
  mode: heavy              # → dspy.GEPA(auto="heavy"): 18 candidates
  tasks_per_minibatch: 3   # → dspy.GEPA(reflection_minibatch_size): paper uses 3

seeds:
  data_seed: 42
  replication_seeds: [42, 123, 456]

num_replications: 3

rl_baselines:
  - algorithm: "REINFORCE+ReBN"
    environment: "math:Orz57K"
    model_name: Qwen3-4B
    model_size: "4B"
    success_rate: 0.674
    tool_augmented: false
    training_condition: single
    metric_name: pass@1
    source: "GEM (Liu et al., 2025)"
    source_detail: "Table 1, MATH500, Base+RL (no tool)"
    estimated: false

comparison_protocol:
  primary_metric: success_rate
  equivalence_test: TOST
  primary_rl_baseline: "REINFORCE+ReBN (no tool)"
  prompt_baselines:
    - name: zero-shot
      description: "Unoptimized DSPy agent with hand-written instructions"
      optimizer:
      requires_optimization: false
    - name: miprov2
      description: "DSPy's Bayesian prompt optimizer baseline"
      optimizer: MIPROv2
      requires_optimization: true

fitness_override:
  gamma: 1.0
  max_steps: 10

cost_budget:
  estimated_tokens_per_experiment: 94000000
  total_budget_usd: 2500.0
  buffer_pct: 0.25
