# Quick test: lightweight Orz57K for development iteration
# Single model, light budget, 1 replication

name: quick-test
description: >
  Fast development config for testing the pipeline end-to-end.
  Uses Orz57K with light GEPA budget and a single replication.

seed_prompt: |
  You are a math problem solver with access to a Python execution tool.

  On each turn, pick exactly ONE of:
    1. Call `python_exec` with a `code` string that PRINTS the value(s)
       you want to see back. Never write Python in a markdown fence.
    2. Commit the final answer with \boxed{...}. Example: \boxed{42}

  Never mix both in one response.

environment:
  gem_env_id: "math:Orz57K"
  env_type: math
  dspy_module: react
  train_size: 50
  val_size: 5
  max_steps: 10
  discount_gamma: 1.0
  tools: [python_exec]
  dataset:
    hf_dataset_id: "axon-rl/ORZ-57k"
    total_train_size: 57000
    subsample_size: 50
    subsample_strategy: uniform
    eval_dataset_id: "axon-rl/math-eval"
    eval_split: MATH500
    eval_size: 500

eval_protocol:
  max_response_tokens: 4096
  temperature_train: 1.0
  temperature_eval: 0.0
  top_p: 1.0
  top_k: -1
  rollouts_per_task: 1
  tost_margin: 0.05
  tost_alpha: 0.05
  bootstrap_iterations: 100

task_models:
  - name: Llama-3.2-1B
    model_id: "bedrock/us.meta.llama3-2-1b-instruct-v1:0"
    provider: bedrock
    parameter_count: "1B"

reflection_model:
  model_id: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
  provider: bedrock
  temperature: 1.0
  max_tokens: 4096

gepa_budget:
  mode: light              # → dspy.GEPA(auto="light"): 6 candidates
  tasks_per_minibatch: 2

seeds:
  data_seed: 42
  replication_seeds: [42]

num_replications: 1

fitness_override:
  gamma: 1.0
  max_steps: 10

cost_budget:
  estimated_tokens_per_experiment: 5000000
  total_budget_usd: 50.0
  buffer_pct: 0.25

rl_baselines: []
