aws:
  region: us-east-1
  # Legacy field name; value will revert to Claude Sonnet once Bedrock access
  # is approved. Keep in sync with gepa.reflection_model.
  bedrock_claude_sonnet_4_5: "openai.gpt-oss-120b-1:0"
  bedrock_llama_1b: "us.meta.llama3-2-1b-instruct-v1:0"
  bedrock_llama_3b: "us.meta.llama3-2-3b-instruct-v1:0"
  bedrock_llama_8b: "us.meta.llama3-1-8b-instruct-v1:0"
  s3_bucket: "trajectory-aware-gym-results"
  s3_prefix: "experiments/"

ollama:
  api_base: "http://localhost:11434"
  task_model_1_7b: "ollama/qwen3-1.7b-base"
  task_model_4b: "ollama/qwen3-4b-base"

sagemaker:
  region: us-east-1
  role_arn: ""
  instance_type: "ml.g5.xlarge"
  deploy_timeout: 1200
  tgi_image_uri: "763104351884.dkr.ecr.us-east-1.amazonaws.com/huggingface-pytorch-tgi-inference:2.7.0-tgi3.3.6-gpu-py311-cu124-ubuntu22.04-v1.1"
  endpoint_1_7b: "qwen3-1-7b-base"
  endpoint_4b: "qwen3-4b-base"
  model_id_1_7b: "Qwen/Qwen3-1.7B-Base"
  model_id_4b: "Qwen/Qwen3-4B-Base"

gem:
  max_steps: 50
  temperature_train: 1.0
  temperature_eval: 0.0
  tool_timeout: 30 #seconds

fitness:
  gamma: 0.99
  lambda: 0.1
  loop_penalty_weight: 1.0
  step_efficiency_weight: 1.0
  max_steps: 50
  loop_window: 3

gepa:
  budget: medium
  population_size: 6
  iterations: 75
  num_threads: 16
  # Must match aws.bedrock_claude_sonnet_4_5 — both change together
  # when the reflection model provider changes.
  reflection_model: "openai.gpt-oss-120b-1:0"

experiment:
  name: baseline_experiment
  random_seed: 42
  num_replications: 3

logging:
  level: INFO
  file: "logs/training.log"

cost_tracking:
  enabled: true
  alert_threshold: 100.0

retry:
  max_attempts: 4
  initial_wait_seconds: 1.0
  max_wait_seconds: 30.0
  exponential_base: 2.0
  jitter: true
  litellm_num_retries: 0
  boto3_retry_mode: standard
  boto3_max_attempts: 3
  inference_semaphore_size: 4
